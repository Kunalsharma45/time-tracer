version: "3.9"

services:

  client:
    build: ./client
    container_name: client_container
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000

  server:
    build: ./server
    container_name: server_container
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo

  mongo:
    image: mongo
    container_name: mongo_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: